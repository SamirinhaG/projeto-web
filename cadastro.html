<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Campus</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
    display:flex;
}

.left{
    width:40%;
    background:#FF6801;
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:36px;
    margin-bottom:15px;
}

.left p{
    line-height:1.6;
    opacity:0.9;
}

.right{
    width:60%;
    padding:50px;
}

.right h2{
    color:#333;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:500;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#FF6801;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:15px;
    background:#FF6801;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:30px;
}
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">🦷 Dental Campus</div>

        <h1>Precisa de atendimento odontológico?</h1>

        <p>
            Preencha o formulário ao lado para que possamos
            encontrar um aluno em formação que possa
            acompanhar seu caso.
            <br>
            <p><h4>Relaxa! Todos nossos atendimentos são acompanhados por um professor.</h4></p>
        </p>
    </div>

    <div class="right">

        <h2>Cadastro de Paciente</h2>

        <form>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <input type="tel">
            </div>

            <div class="form-group">
                <label>E-mail (opcional)</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label>Descreva sua necessidade</label>
                <textarea></textarea>
            </div>

            <button type="submit">
                Solicitar Atendimento
            </button>

        </form>

    </div>

</div>

</body>
</html>
