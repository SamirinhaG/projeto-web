<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Campus</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
    display:flex;
}

.left{
    width:40%;
    background:#FF6801;
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:36px;
    margin-bottom:15px;
}

.left p{
    line-height:1.6;
    opacity:0.9;
}

.right{
    width:60%;
    padding:50px;
}

.right h2{
    color:#333;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:500;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#FF6801;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:15px;
    background:#FF6801;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:30px;
}

.mensagem {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    font-weight: 500;
    text-align: center;
    display: none; 
}
.sucesso { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
.erro { background: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">🦷 Dental Campus</div>

        <h1>Precisa de atendimento odontológico?</h1>

        <div style="line-height:1.6; opacity:0.9;">

            <p>
                Preencha o formulário ao lado para que possamos
                encontrar um aluno em formação que possa
                acompanhar seu caso.
            </p>
            <br>
            <h4>Relaxa! Todos nossos atendimentos são acompanhados por um professor.</h4>
        </div>
    </div>

    <div class="right">

        <h2>Cadastro de Paciente</h2>

        <form id="form-cadastro">

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="telefone" name="telefone" required placeholder="Digite seu telefone">
            </div>

            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="idade" name="idade" required min="5" placeholder="Digite sua idade">
            </div>

            <div class="form-group">
                <label>E-mail (opcional)</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
            </div>

            <div class="form-group">
                <label>Descreva sua necessidade (Prontuário Inicial)</label>
                <textarea id="descricao" name="descricao" placeholder="Ex: dor de dente, limpeza, restauração,etc."></textarea>
            </div>

            <button type="submit" id="btn-cadastrar">
                Solicitar Atendimento
            </button>

            <div id="mensagem-status" class="mensagem"></div>

        </form>

    </div>

</div>

<script>
    // 1. MODELO: Classe Paciente Simplificada
    class Paciente {
        constructor(id, nome, telefone, idade, email, prontuárioTexto = null) {
            this.id = id;                      
            this.nome = nome;
            this.telefone = telefone;
            this.idade = idade;
            this.email = email;
            this.status = "Ativo";
            this.alunoResponsavel = null;
            this.prontuario = prontuárioTexto; // A área de texto simplificada que você pediu

        }
    }

    // 2. REPOSITÓRIO: Gerenciador com salvamento real (localStorage)
    class PacienteRepository {
        constructor() {
            // Tenta pegar a lista salva no navegador. Se não existir nada, começa com uma lista vazia.
            let dadosSalvos = localStorage.getItem("banco_pacientes");
            this._pacientes = dadosSalvos ? JSON.parse(dadosSalvos) : [];
        }

        obterNumeroDePacientes() {
            return this._pacientes.length;
        }

        buscarTodos() {
            return this._pacientes;
        }

        // Procura se já existe um paciente com o mesmo nome e telefone na lista
        buscarExistente(nome, telefone) {
            return this._pacientes.find(p => 
                p.nome.trim().toLowerCase() === nome.trim().toLowerCase() && 
                p.telefone.trim() === telefone.trim()
            );
        }

        // Atribui o ID automático baseado no tamanho e salva permanentemente
        salvar(novoPaciente) {
            let proximoId = this.obterNumeroDePacientes() + 1;
            novoPaciente.id = proximoId;
            
            this._pacientes.push(novoPaciente);
            
            // Salva a lista atualizada no navegador para não perder ao recarregar a página
            localStorage.setItem("banco_pacientes", JSON.stringify(this._pacientes));
            
            console.log(`[Banco de Dados] Paciente salvo permanentemente! Total: ${this.obterNumeroDePacientes()}`);
        }
    }

    // 3. EVENTOS: Controle do Formulário da Tela
    document.addEventListener("DOMContentLoaded", () => {
        let dbPacientes = new PacienteRepository();
        
        // Mostra no console (F12) o que já está salvo no navegador
        console.log("Pacientes atualmente salvos:", dbPacientes.buscarTodos());

        let formulario = document.getElementById("form-cadastro");
        let msgStatus = document.getElementById("mensagem-status");

        if (formulario) {
            formulario.addEventListener("submit", (evento) => {
                evento.preventDefault(); // Impede a página de recarregar e quebrar o fluxo

                // Pega o que foi digitado na tela
                let inputNome = document.getElementById("nome").value;
                let inputTelefone = document.getElementById("telefone").value;
                let inputIdade = document.getElementById("idade").value;
                let inputEmail = document.getElementById("email").value;
                let inputDescricao = document.getElementById("descricao").value;

                // 1ª VALIDAÇÃO: Não deixa mandar se os obrigatórios estiverem vazios
                if (inputNome.trim() === "" || inputTelefone.trim() === "" || inputDescricao.trim() === "" || inputIdade.trim() === "") {
                    msgStatus.innerText = "Por favor, preencha todos os campos obrigatórios!";
                    msgStatus.className = "mensagem erro";
                    msgStatus.style.display = "block";
                    return;
                }

                // 2ª VALIDAÇÃO: Checa se já existe no repositório
                let pacienteExistente = dbPacientes.buscarExistente(inputNome, inputTelefone);

                if (pacienteExistente) {
                    // Se já existir, mostra apenas a mensagem na tela
                    msgStatus.innerText = "Paciente já cadastrado!";
                    msgStatus.className = "mensagem erro";
                    msgStatus.style.display = "block";
                } else {
                    // Se não existir, pega o texto da "necessidade" e guarda como o prontuário inicial dele
                    let novoPaciente = new Paciente(null, inputNome, inputTelefone, inputIdade, inputEmail, inputDescricao);
                    
                    // Salva no repositório (que injeta o ID automático e grava no localStorage)
                    dbPacientes.salvar(novoPaciente);

                    // Mostra mensagem de sucesso na tela
                    msgStatus.innerText = "Cadastro realizado!";
                    msgStatus.className = "mensagem sucesso";
                    msgStatus.style.display = "block";

                    // Limpa os campos do formulário para o próximo
                    formulario.reset();
                    
                    console.log("Lista Atualizada:", dbPacientes.buscarTodos());
                }
            });
        }
    });
</script>

</body>
</html>
