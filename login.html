<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Campus</title>

<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    background:#ffffff;
}

.container{
    display:flex;
    min-height:100vh;
    background-color: aliceblue;
}

.right{
    width:55%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
}

.logo{
    color:#FF6801;
    font-size:18px;
    font-weight:700;
    margin-bottom:20px;
}

h1{
    font-size:60px;
    line-height:1.1;
    color:#222;
    margin-bottom:25px;
}

.highlight{
    color:#FF6801;
}

.description{
    color:#666;
    font-size:18px;
    line-height:1.8;
    max-width:550px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:15px;
}

.btn1{
    background:#FF6801;
    color:white;
    text-decoration:none;
    padding:16px 32px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.btn1:hover{
    transform:translateY(-2px);
}

.btn2{
    border:2px solid #FF6801;
    color:#FF6801;
    text-decoration:none;
    padding:16px 32px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.btn2:hover{
    background:#FFF4EC;
}

.left{
    width:45%;
    background:#FF6801;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.card{
    background:white;
    width:320px;
    height: fit-content;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.card h3{
    color:#333;
    margin-bottom:20px;
}

.item{
    padding:12px;
    border-radius:10px;
    border:solid 1px #FF6801;
    background:#fafafa;
    margin-bottom:10px;
}

.item strong{
    display:block;
    color:#333;
}

.item span{
    color:#777;
    font-size:14px;
}

.footer{
    position:absolute;
    bottom:30px;
    left:80px;
    color:#888;
    font-size:14px;
}

</style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="card">,
                
                <h1> Já possui login?</h1>
                <p class="description">Preencha suas informações ao lado.</p>
                <div class="item">
                    <h3> Se atente às informações e preencha corretamente seus dados.</h3>
                </div>
                <footer>Projeto acadêmico UFC • Odontologia Católica</footer>
            </div>
        </div>
    </div>
</body>
</html>
