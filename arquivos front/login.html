<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Campus</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
    display:flex;
}

.left{
    width:40%;
    background:#FF6801;
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left .logo{
    font-size:20px;
    font-weight:bold;
    margin-bottom:30px;
}

.left h1{
    font-size:28px;
    margin-bottom:15px;
    line-height:1.4;
}

.left p{
    line-height:1.6;
    opacity:0.9;
}

.right{
    width:60%;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right h2{
    color:#333;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:500;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#FF6801;
}

button{
    width:100%;
    padding:15px;
    background:#FF6801;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.link-voltar{
    display:block;
    text-align:center;
    margin-top:16px;
    color:#FF6801;
    text-decoration:none;
    font-size:14px;
}

.link-voltar:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="container">

    <div class="left">

        <div class="logo">🦷 Dental Campus</div>

        <h1>Área do Aluno</h1>

        <p>
            Acesse sua conta para gerenciar
            seus pacientes e acompanhar
            seu prontuário.
        </p>

    </div>

    <div class="right">

        <h2>Entrar</h2>

        <div class="form-group">
            <label>Matrícula</label>
            <input type="text" id="matricula" placeholder="Sua matrícula">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Sua senha">
        </div>

        <button id="btnLogin">Entrar</button>

        <a href="index.html" class="link-voltar">← Voltar para o início</a>

    </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
